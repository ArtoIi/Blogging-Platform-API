version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: blog_mysql_container
    restart: always
    environment:
      MYSQL_DATABASE: 'blog_db'
      MYSQL_ROOT_PASSWORD: 'senha_poderosa'
    ports:
      - '3306:3306'
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init/schema.sql:/docker-entrypoint-initdb.d/1.sql

volumes:
  mysql_data: